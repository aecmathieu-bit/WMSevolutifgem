<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIAG - Gestion de Stock & Logistique</title>
    <style>
        :root { --p: #2c3e50; --s: #34495e; --a: #3498db; --ok: #27ae60; --err: #e74c3c; }
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: var(--p); color: white; padding: 1rem; display: flex; justify-content: space-between; }
        nav { background: var(--s); display: flex; }
        nav button { color: white; border: none; padding: 15px; cursor: pointer; background: none; }
        nav button.active { background: var(--a); }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        section { display: none; }
        section.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #eee; }
        .badge-err { color: var(--err); font-weight: bold; }
        .badge-ok { color: var(--ok); font-weight: bold; }
        input { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        .btn-go { background: var(--a); color: white; border: none; padding: 10px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<header>
    <strong>TABLEAU DE BORD SIAG</strong>
    <span id="date"></span>
</header>

<nav>
    <button onclick="tab('art')" id="b-art" class="active">ARTICLES & BNMP</button>
    <button onclick="tab('trs')">PERFORMANCE & TRS</button>
    <button onclick="tab('appro')">APPROVISIONNEMENT</button>
</nav>

<div class="container">

    <section id="art" class="active">
        <div style="display: grid; grid-template-columns: 300px 1fr; gap: 20px;">
            <div class="card">
                <h3>Ajouter / Modifier</h3>
                <input type="text" id="in-sku" placeholder="SKU">
                <input type="number" id="in-phys" placeholder="Stock Physique">
                <input type="number" id="in-trans" placeholder="En Transit">
                <input type="number" id="in-res" placeholder="Réservé">
                <input type="number" id="in-min" placeholder="Seuil Min">
                <button class="btn-go" onclick="save()">Enregistrer</button>
            </div>
            <div class="card">
                <h3>Inventaire Temps Réel</h3>
                <table>
                    <thead>
                        <tr><th>SKU</th><th>Phys</th><th>Transit</th><th>Réservé</th><th>NET</th><th>Seuil</th><th>Statut</th></tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="trs">
        <div class="card">
            <h3>Calculateur TRS Académique</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Temps Planifié (min)</label><input type="number" id="t1" value="480">
                    <label>Arrêts (min)</label><input type="number" id="t2" value="40">
                    <label>Cadence (pcs/h)</label><input type="number" id="t3" value="100">
                    <label>Total Produit</label><input type="number" id="t4" value="700">
                    <label>Mauvais</label><input type="number" id="t5" value="10">
                    <button class="btn-go" onclick="calcTRS()" style="margin-top:10px">Analyser</button>
                </div>
                <div id="res-trs" style="background:#f9f9f9; padding:15px; border-radius:5px;">
                    Résultats TRS s'afficheront ici.
                </div>
            </div>
        </div>
    </section>

    <section id="appro">
        <div class="card">
            <h3>Brouillons de Commandes (PO Drafts)</h3>
            <table id="t-draft">
                <thead><tr><th>Date</th><th>SKU</th><th>Besoin</th><th>Action</th></tr></thead>
                <tbody id="tbody-draft"></tbody>
            </table>
        </div>
        <div class="card">
            <h3>Journal de Traçabilité</h3>
            <div id="logs" style="font-family: monospace; font-size: 0.8em; color: #555;"></div>
        </div>
    </section>

</div>

<script>
    // --- JEU DE DONNÉES DES SKU ---
    let data = [
        {sku: "PNEU-V15", phys: 45, trans: 20, res: 10, min: 80},
        {sku: "JANTE-ALU-17", phys: 120, trans: 0, res: 5, min: 50},
        {sku: "VALVE-TR414", phys: 300, trans: 100, res: 50, min: 500},
        {sku: "HUILE-5W30", phys: 12, trans: 24, res: 8, min: 20}
    ];

    function tab(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        render();
    }

    function render() {
        // Table Articles
        const tb = document.getElementById('tbody');
        tb.innerHTML = '';
        data.forEach(a => {
            const net = a.phys + a.trans - a.res;
            const status = net < a.min ? '<span class="badge-err">RECOMMANDE</span>' : '<span class="badge-ok">OK</span>';
            tb.innerHTML += `<tr><td>${a.sku}</td><td>${a.phys}</td><td>${a.trans}</td><td>${a.res}</td><td>${net}</td><td>${a.min}</td><td>${status}</td></tr>`;
        });

        // Table Appro
        const tbd = document.getElementById('tbody-draft');
        tbd.innerHTML = '';
        data.forEach(a => {
            const net = a.phys + a.trans - a.res;
            if(net < a.min) {
                tbd.innerHTML += `<tr><td>${new Date().toLocaleDateString()}</td><td>${a.sku}</td><td>${a.min - net}</td><td><button onclick="logPo('${a.sku}')">Confirmer PO</button></td></tr>`;
            }
        });
    }

    function save() {
        const a = {
            sku: document.getElementById('in-sku').value,
            phys: parseInt(document.getElementById('in-phys').value) || 0,
            trans: parseInt(document.getElementById('in-trans').value) || 0,
            res: parseInt(document.getElementById('in-res').value) || 0,
            min: parseInt(document.getElementById('in-min').value) || 0
        };
        data.push(a);
        render();
        log(`Nouvel article ajouté : ${a.sku}`);
    }

    function calcTRS() {
        const plan = parseFloat(document.getElementById('t1').value);
        const arr = parseFloat(document.getElementById('t2').value);
        const cadH = parseFloat(document.getElementById('t3').value);
        const tot = parseFloat(document.getElementById('t4').value);
        const mauv = parseFloat(document.getElementById('t5').value);

        const d = (plan - arr) / plan;
        const p = (tot / ((plan - arr) / 60)) / cadH;
        const q = (tot - mauv) / tot;
        const trs = d * p * q * 100;

        document.getElementById('res-trs').innerHTML = `
            <strong>TRS : ${trs.toFixed(1)}%</strong><hr>
            Dispo : ${(d*100).toFixed(1)}%<br>
            Perf : ${(p*100).toFixed(1)}%<br>
            Qualité : ${(q*100).toFixed(1)}%<br>
            <em>${trs < 75 ? "Analyse : Performance à surveiller" : "Analyse : Conforme"}</em>
        `;
    }

    function logPo(sku) {
        log(`COMMANDE FERME : PO-${Math.floor(Math.random()*1000)} pour ${sku} générée.`);
        alert("Bon de commande généré avec succès.");
    }

    function log(msg) {
        document.getElementById('logs').innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + document.getElementById('logs').innerHTML;
    }

    window.onload = () => {
        document.getElementById('date').innerText = new Date().toLocaleDateString();
        render();
    };
</script>

</body>
</html>
